# 거래처 매칭 프로그램 설정 파일
# 이 파일은 메모장 등 txt 에디터로 수정할 수 있습니다.
# 값을 변경한 뒤 matching-files.exe를 다시 실행하면 적용됩니다.

[paths]
# 실행파일 기준 상대 경로입니다.
input_dir = input
output_dir = output
a_file = A.xlsx
b_file = B.xlsx
output_file = C.xlsx

[matching]
# 결과에 표시할 최소 총점입니다. 80이면 80점 이상만 표시합니다.
match_threshold = 80

# A 1개 행당 표시할 후보 개수입니다.
max_candidates = 5

# 최종 fallback 전체 비교 시 최대 후보 수입니다.
# 값을 키우면 누락 가능성은 줄지만 실행 시간이 늘어날 수 있습니다.
max_fallback_candidates = 1000

# 탐색기에서 실행했을 때 종료 전에 Enter 입력을 기다릴지 설정합니다.
pause_on_exit = true

[name]
# 일반명이어서 충돌 위험이 있는 거래처명 토큰입니다. 쉼표로 구분합니다.
general_name_risk_tokens = 서울,중앙,제일,성모,우리,하나,행복,사랑

[admin_alias]
# 행정구역 명칭 변경/별칭을 지정합니다.
# 형식: 원본시도|원본시군구 = 정규화시도|정규화시군구
인천|남구 = 인천|미추홀구

[equiv_map]
# 서로 같은 주소로 강제 처리할 예외 주소를 지정합니다.
# 형식: 주소1 = 주소2
# 예:
# 부산 사하구 사하로186번가길 1 = 부산 사하구 사하로 188
