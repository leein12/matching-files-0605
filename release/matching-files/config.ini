# 거래처 매칭 프로그램 설정 파일
# 이 파일은 메모장 등 txt 에디터로 수정할 수 있습니다.
# 값을 변경한 뒤 matching-files.exe를 다시 실행하면 적용됩니다.

[paths]
# 실행파일 기준 상대 경로입니다.
input_dir = input
output_dir = output
a_file = A.xlsx
b_file = B.xlsx
output_file = C.xlsx

[matching]
# 실행 모드입니다.
# auto: A/B 양쪽에 고객코드, 고객명 컬럼이 있으면 고객명 정확일치 모드,
#       없으면 기존 거래처 유사도 매칭 모드로 실행합니다.
# customer_exact: 고객명 100% 일치 기준으로 기존 거래처를 매핑합니다.
# company_similarity: 기존 거래처명+주소+전화번호 유사도 매칭으로 실행합니다.
mode = auto

# 후보 표시 최소 총점입니다. 기본값 0은 계산된 후보를 점수와 무관하게 표시합니다.
# customer_exact 모드에서는 사용하지 않습니다.
match_threshold = 0

# A 1개 행당 표시할 후보 개수입니다.
max_candidates = 3

# 탐색기에서 실행했을 때 종료 전에 Enter 입력을 기다릴지 설정합니다.
pause_on_exit = true

[result_ranges]
# 매칭결과 구간입니다. 형식: 구분 = 시작점수,종료점수
# 엑셀 결과 파일의 "기준" 시트에서도 같은 값을 수정해 다시 볼 수 있습니다.
확정 = 80,100
검토 = 70,79
미매칭 = 0,69

[name]
# 일반명이어서 충돌 위험이 있는 거래처명 토큰입니다. 쉼표로 구분합니다.
general_name_risk_tokens = 서울,중앙,제일,성모,우리,하나,행복,사랑

[admin_alias]
# 행정구역 명칭 변경/별칭을 지정합니다.
# 형식: 원본시도|원본시군구 = 정규화시도|정규화시군구
인천|남구 = 인천|미추홀구
경북|군위군 = 대구|군위군

[equiv_map]
# 서로 같은 주소로 강제 처리할 예외 주소를 지정합니다.
# 형식: 주소1 = 주소2
# 예:
# 부산 사하구 사하로186번가길 1 = 부산 사하구 사하로 188
